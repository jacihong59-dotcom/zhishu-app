<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>知识蒸馏 - 谢胜子 & 曲曲</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        :root {
            --xie-primary: #8B5E3C;
            --xie-bg: #FDF8F3;
            --xie-light: #F5EDE6;
            --ququ-primary: #C43A3A;
            --ququ-bg: #FDF5F5;
            --ququ-light: #FCE8E8;
            --text: #2D2D2D;
            --text-light: #888;
            --border: #E8E0D8;
            --shadow: 0 2px 16px rgba(0,0,0,0.08);
        }
        html, body {
            height: 100%;
            font-family: -apple-system, "PingFang SC", "Microsoft YaHei", sans-serif;
            background: #F5F0EB;
            color: var(--text);
            overflow: hidden;
            user-select: none;
            -webkit-user-select: none;
        }

        /* ===== SELECTION SCREEN ===== */
        #selection-screen {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100%;
            padding: 30px;
            background: linear-gradient(180deg, #F5F0EB 0%, #EDE5DC 100%);
        }
        #selection-screen .logo-area {
            margin-bottom: 40px;
            text-align: center;
        }
        #selection-screen .logo-area h1 {
            font-size: 28px;
            font-weight: 700;
            color: var(--text);
            letter-spacing: 2px;
        }
        #selection-screen .logo-area p {
            font-size: 14px;
            color: var(--text-light);
            margin-top: 8px;
        }
        .character-card {
            width: 100%;
            max-width: 340px;
            padding: 28px 24px;
            margin-bottom: 18px;
            border-radius: 20px;
            background: white;
            cursor: pointer;
            transition: all 0.3s ease;
            box-shadow: var(--shadow);
            position: relative;
            overflow: hidden;
        }
        .character-card:active { transform: scale(0.97); }
        .character-card .emoji-badge {
            font-size: 40px;
            display: block;
            margin-bottom: 10px;
        }
        .character-card h2 { font-size: 22px; font-weight: 700; margin-bottom: 6px; }
        .character-card p { font-size: 13px; color: var(--text-light); line-height: 1.5; }
        .character-card .tag {
            display: inline-block;
            padding: 3px 10px;
            border-radius: 20px;
            font-size: 11px;
            margin-top: 10px;
        }
        .card-xie { border-left: 5px solid var(--xie-primary); }
        .card-xie .tag { background: var(--xie-light); color: var(--xie-primary); }
        .card-ququ { border-left: 5px solid var(--ququ-primary); }
        .card-ququ .tag { background: var(--ququ-light); color: var(--ququ-primary); }

        /* ===== CHAT SCREEN ===== */
        #chat-screen { display: none; height: 100%; flex-direction: column; }
        #chat-screen.active { display: flex; }

        /* Header */
        .chat-header {
            display: flex;
            align-items: center;
            padding: 14px 16px;
            background: white;
            border-bottom: 1px solid var(--border);
            flex-shrink: 0;
            position: relative;
            z-index: 10;
        }
        .chat-header .back-btn {
            width: 36px; height: 36px;
            display: flex; align-items: center; justify-content: center;
            border: none; background: none; font-size: 22px;
            cursor: pointer; border-radius: 50%;
            transition: background 0.2s;
            flex-shrink: 0;
        }
        .chat-header .back-btn:active { background: #f0f0f0; }
        .chat-header .avatar {
            width: 38px; height: 38px;
            border-radius: 50%;
            display: flex; align-items: center; justify-content: center;
            font-size: 20px;
            margin: 0 12px;
            flex-shrink: 0;
        }
        .avatar-xie { background: var(--xie-light); }
        .avatar-ququ { background: var(--ququ-light); }
        .chat-header .info { flex: 1; }
        .chat-header .info h3 { font-size: 16px; font-weight: 600; }
        .chat-header .info p { font-size: 11px; color: var(--text-light); }
        .chat-header .count-badge {
            font-size: 11px;
            color: var(--text-light);
            padding: 4px 10px;
            background: #f5f5f5;
            border-radius: 12px;
        }
        .chat-header .clear-btn {
            font-size: 11px;
            color: #bbb;
            margin-left: 6px;
            cursor: pointer;
            padding: 4px 6px;
            border-radius: 8px;
            user-select: none;
        }
        .chat-header .clear-btn:hover { color: #e74c3c; background: #fff0f0; }

        /* Messages */
        .chat-messages {
            flex: 1;
            overflow-y: auto;
            padding: 16px;
            -webkit-overflow-scrolling: touch;
        }
        .msg {
            margin-bottom: 16px;
            display: flex;
            align-items: flex-start;
            animation: fadeInUp 0.3s ease;
        }
        @keyframes fadeInUp {
            from { opacity: 0; transform: translateY(12px); }
            to { opacity: 1; transform: translateY(0); }
        }
        .msg.user { flex-direction: row-reverse; }
        .msg .bubble {
            max-width: 82%;
            padding: 12px 16px;
            border-radius: 16px;
            font-size: 15px;
            line-height: 1.6;
            white-space: pre-wrap;
            word-break: break-word;
        }
        .msg.ai .bubble {
            background: white;
            border-radius: 16px 16px 16px 4px;
            box-shadow: 0 1px 4px rgba(0,0,0,0.06);
        }
        .msg.user .bubble {
            background: var(--xie-primary);
            color: white;
            border-radius: 16px 16px 4px 16px;
        }
        .msg.user.ququ-mode .bubble {
            background: var(--ququ-primary);
        }
        .msg .avatar-sm {
            width: 30px; height: 30px;
            border-radius: 50%;
            display: flex; align-items: center; justify-content: center;
            font-size: 15px;
            margin: 0 8px;
            flex-shrink: 0;
        }
        .msg.ai .avatar-sm { background: var(--xie-light); }
        .msg.ai.ququ-mode .avatar-sm { background: var(--ququ-light); }

        /* Reference chips */
        .ref-chips {
            display: flex; flex-wrap: wrap; gap: 4px;
            margin-top: 8px;
        }
        .ref-chip {
            font-size: 11px;
            padding: 3px 8px;
            border-radius: 10px;
            background: var(--xie-light);
            color: var(--xie-primary);
        }
        .ref-chip.ququ-mode { background: var(--ququ-light); color: var(--ququ-primary); }

        /* Typing indicator */
        .typing {
            display: flex;
            align-items: center;
            padding: 14px 20px;
            margin-bottom: 12px;
        }
        .typing .dots {
            display: flex; gap: 4px;
        }
        .typing .dots span {
            width: 7px; height: 7px;
            border-radius: 50%;
            background: #ccc;
            animation: typingAnim 1.2s infinite;
        }
        .typing .dots span:nth-child(2) { animation-delay: 0.2s; }
        .typing .dots span:nth-child(3) { animation-delay: 0.4s; }
        @keyframes typingAnim {
            0%, 60%, 100% { opacity: 0.3; transform: scale(0.8); }
            30% { opacity: 1; transform: scale(1.2); }
        }

        .bubble.thinking {
            background: white;
            color: #888;
            font-size: 14px;
            display: flex;
            align-items: center;
            gap: 2px;
        }
        .thinking-dots span {
            animation: dotPulse 1.2s infinite;
            font-size: 18px;
            line-height: 1;
            color: #aaa;
        }
        .thinking-dots span:nth-child(2) { animation-delay: 0.2s; }
        .thinking-dots span:nth-child(3) { animation-delay: 0.4s; }
        @keyframes dotPulse {
            0%, 60%, 100% { opacity: 0.2; }
            30% { opacity: 1; }
        }
        @keyframes fadeIn {
            from { opacity: 0; transform: translateX(-50%) translateY(10px); }
            to { opacity: 1; transform: translateX(-50%) translateY(0); }
        }

        /* Input area */
        .chat-input {
            display: flex;
            align-items: center;
            padding: 10px 14px;
            background: white;
            border-top: 1px solid var(--border);
            flex-shrink: 0;
            gap: 8px;
        }
        .chat-input input {
            flex: 1;
            border: none;
            outline: none;
            padding: 10px 14px;
            background: #F5F0EB;
            border-radius: 24px;
            font-size: 15px;
            color: var(--text);
            min-height: 42px;
        }
        .chat-input input::placeholder { color: #bbb; }
        .chat-input .send-btn {
            width: 42px; height: 42px;
            border: none;
            border-radius: 50%;
            display: flex; align-items: center; justify-content: center;
            font-size: 18px;
            cursor: pointer;
            transition: all 0.2s;
            flex-shrink: 0;
        }
        .chat-input .send-btn:active { transform: scale(0.9); }
        .send-btn.xie { background: var(--xie-primary); color: white; }
        .send-btn.ququ { background: var(--ququ-primary); color: white; }

        .chat-input .mic-btn {
            width: 38px; height: 38px;
            border: none;
            border-radius: 50%;
            display: flex; align-items: center; justify-content: center;
            font-size: 18px;
            cursor: pointer;
            transition: all 0.2s;
            flex-shrink: 0;
            background: #f0f0f0;
            color: #666;
            user-select: none;
            -webkit-user-select: none;
            touch-action: none;
        }
        .chat-input .mic-btn:active { transform: scale(0.9); }
        .chat-input .mic-btn.recording {
            background: #ff4444;
            color: white;
            transform: scale(1.15);
            box-shadow: 0 0 0 6px rgba(255,68,68,0.2);
        }

        /* Recording overlay panel */
        .recording-panel {
            display: none;
            position: fixed;
            bottom: 80px;
            left: 50%;
            transform: translateX(-50%);
            background: rgba(0,0,0,0.85);
            color: white;
            padding: 16px 28px;
            border-radius: 16px;
            text-align: center;
            z-index: 999;
            min-width: 200px;
            backdrop-filter: blur(8px);
        }
        .recording-panel.active { display: block; animation: fadeIn 0.2s; }
        .recording-panel .rp-icon { font-size: 36px; margin-bottom: 6px; }
        .recording-panel .rp-timer {
            font-size: 15px;
            font-weight: 600;
            letter-spacing: 1px;
            font-variant-numeric: tabular-nums;
        }
        .recording-panel .rp-hint {
            font-size: 12px;
            color: rgba(255,255,255,0.6);
            margin-top: 4px;
        }
        .recording-panel .rp-hint.cancel {
            color: #ff6b6b;
        }
        .recording-panel .rp-wave {
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 4px;
            height: 40px;
            margin-bottom: 8px;
        }
        .recording-panel .rp-wave span {
            display: block;
            width: 4px;
            background: #ff4444;
            border-radius: 2px;
            animation: rpWave 0.5s ease-in-out infinite alternate;
        }
        .recording-panel .rp-wave span:nth-child(1) { height: 12px; animation-delay: 0s; }
        .recording-panel .rp-wave span:nth-child(2) { height: 22px; animation-delay: 0.1s; }
        .recording-panel .rp-wave span:nth-child(3) { height: 30px; animation-delay: 0.2s; }
        .recording-panel .rp-wave span:nth-child(4) { height: 24px; animation-delay: 0.3s; }
        .recording-panel .rp-wave span:nth-child(5) { height: 16px; animation-delay: 0.15s; }
        .recording-panel .rp-wave span:nth-child(6) { height: 28px; animation-delay: 0.25s; }
        .recording-panel .rp-wave span:nth-child(7) { height: 20px; animation-delay: 0.05s; }
        @keyframes rpWave {
            0% { transform: scaleY(0.6); }
            100% { transform: scaleY(1); }
        }
        /* Slide up to cancel zone */
        .recording-panel .rp-cancel-zone {
            display: none;
            margin-top: 8px;
            padding: 6px 12px;
            border-radius: 8px;
            background: rgba(255,68,68,0.2);
            font-size: 12px;
            color: #ff6b6b;
        }
        .recording-panel .rp-cancel-zone.active { display: block; }

        /* Voice button on AI messages */
        .msg.ai .bubble {
            display: inline-flex;
            align-items: flex-start;
            gap: 8px;
            max-width: calc(100% - 50px);
        }
        .msg.ai .bubble .msg-text {
            flex: 1;
            min-width: 0;
        }
        .speaker-btn {
            flex-shrink: 0;
            width: 32px; height: 32px;
            border: none;
            border-radius: 50%;
            background: var(--xie-primary);
            color: white;
            font-size: 16px;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: all 0.2s;
            margin-top: 2px;
        }
        .ququ-mode .speaker-btn { background: var(--ququ-primary); }
        .speaker-btn:active { transform: scale(0.85); }
        .speaker-btn.playing {
            background: #ff4444;
            animation: speakPulse 0.8s infinite;
        }
        @keyframes speakPulse {
            0%, 100% { box-shadow: 0 0 0 0 rgba(255,68,68,0.3); }
            50% { box-shadow: 0 0 0 6px rgba(255,68,68,0); }
        }
        /* Waveform bars inside speaker button */
        .speaker-btn .wave {
            display: flex;
            align-items: center;
            gap: 2px;
            height: 16px;
        }
        .speaker-btn .wave span {
            display: block;
            width: 3px;
            background: white;
            border-radius: 2px;
            animation: waveAnim 0.5s ease-in-out infinite alternate;
        }
        .speaker-btn .wave span:nth-child(1) { height: 6px; animation-delay: 0s; }
        .speaker-btn .wave span:nth-child(2) { height: 12px; animation-delay: 0.15s; }
        .speaker-btn .wave span:nth-child(3) { height: 8px; animation-delay: 0.3s; }
        .speaker-btn .wave span:nth-child(4) { height: 14px; animation-delay: 0.1s; }
        .speaker-btn .wave span:nth-child(5) { height: 7px; animation-delay: 0.25s; }
        @keyframes waveAnim {
            0% { transform: scaleY(0.5); }
            100% { transform: scaleY(1); }
        }

        .chat-input .mic-btn.recording {
            background: #ff4444;
            color: white;
            animation: micPulse 1s infinite;
        }
        @keyframes micPulse {
            0%, 100% { box-shadow: 0 0 0 0 rgba(255,68,68,0.4); }
            50% { box-shadow: 0 0 0 8px rgba(255,68,68,0); }
        }

        /* Image upload */
        .img-btn {
            width: 38px; height: 38px;
            border: none; border-radius: 50%;
            display: flex; align-items: center; justify-content: center;
            font-size: 18px; cursor: pointer;
            background: #f0f0f0; color: #666;
            flex-shrink: 0; transition: all 0.2s;
        }
        .img-btn:active { transform: scale(0.9); }
        .img-preview {
            display: none;
            padding: 6px 14px 2px 14px;
            background: white;
            border-top: 1px solid var(--border);
        }
        .img-preview.active { display: flex; align-items: center; gap: 8px; }
        .img-preview img {
            max-height: 60px; max-width: 60px;
            border-radius: 8px; object-fit: cover;
            border: 1px solid var(--border);
        }
        .img-preview .img-name {
            font-size: 12px; color: var(--text-light);
            flex: 1; overflow: hidden; text-overflow: ellipsis; white-space: nowrap;
        }
        .img-preview .img-remove {
            font-size: 18px; cursor: pointer; color: #999;
            background: none; border: none; padding: 4px;
        }

        /* Welcome message */
        .welcome-msg {
            text-align: center;
            padding: 40px 20px;
            color: var(--text-light);
        }
        .welcome-msg .icon-big { font-size: 48px; display: block; margin-bottom: 12px; }
        .welcome-msg h3 { font-size: 18px; color: var(--text); margin-bottom: 6px; }
        .welcome-msg p { font-size: 13px; line-height: 1.6; }
        .suggestion-chips {
            display: flex; flex-wrap: wrap; justify-content: center;
            gap: 8px; margin-top: 20px;
        }
        .suggestion-chips button {
            padding: 8px 16px;
            border-radius: 20px;
            border: 1px solid var(--border);
            background: white;
            font-size: 13px;
            cursor: pointer;
            transition: all 0.2s;
        }
        .suggestion-chips button:active { background: #f0f0f0; }

        /* Responsive */
        @media (min-width: 600px) {
            #chat-screen {
                max-width: 420px;
                margin: 0 auto;
                border-left: 1px solid var(--border);
                border-right: 1px solid var(--border);
            }
            #selection-screen .character-card { max-width: 380px; }
        }
    </style>
</head>

<!-- ===== SELECTION SCREEN ===== -->
<div id="selection-screen">
    <div class="logo-area">
        <h1>知识蒸馏</h1>
        <p>选择你的导师</p>
    </div>

    <div class="character-card card-xie" onclick="startChat('谢胜子')">

        <span class="tag">结构化 · 方法论</span>

    <div class="character-card card-ququ" onclick="startChat('曲曲')">

        <h2>曲曲大女人</h2>

        <span class="tag">人间清醒 · 扎心真相</span>
    </div>
</div>

<!-- ===== CHAT SCREEN ===== -->
<div id="chat-screen">
    <div class="chat-header">
        <button class="back-btn" onclick="backToSelection()">‹</button>
        <div class="avatar" id="header-avatar">📚</div>
        <div class="info">
            <h3 id="header-name">谢胜子</h3>

        <span class="clear-btn" id="clear-btn" onclick="clearChatHistory()">清空</span>

    <div class="chat-messages" id="chat-messages">

            <div class="suggestion-chips" id="suggestion-chips"></div>
        </div>
    </div>

    <div class="chat-input">
        <button class="img-btn" id="img-btn" type="button">📎</button>
        <input type="text" id="message-input" placeholder="输入你的问题..." autocomplete="off">
        <button class="mic-btn" id="mic-btn" type="button">🎤</button>
        <button class="send-btn xie" id="send-btn" onclick="sendMessage()">➤</button>
    </div>
    <input type="file" id="file-input" accept="image/*" style="display:none">

    <!-- Image preview -->
    <div class="img-preview" id="img-preview">
        <img id="preview-img" src="" alt="preview">
        <span class="img-name" id="preview-name"></span>
        <button class="img-remove" id="preview-remove">✕</button>
    </div>

    <!-- Recording overlay -->
    <div class="recording-panel" id="recording-panel">
        <div class="rp-wave" id="rp-wave"><span></span><span></span><span></span><span></span><span></span><span></span><span></span></div>
        <div class="rp-icon">🎤</div>
        <div class="rp-timer" id="rp-timer">00:00</div>
        <div class="rp-hint" id="rp-hint">点击发送按钮停止录音</div>
    </div>
</div>

function tokenize(text) {
    const tokens = new Set();
    const chineseMatches = text.match(/[一-鿿]{2,5}/g) || [];
    for (const seq of chineseMatches) {
        for (let i = 0; i < seq.length; i++) {
            for (let j = i + 2; j <= Math.min(i + 4, seq.length + 1); j++) {
                tokens.add(seq.substring(i, j));
            }
        }
    }
    const engMatches = text.match(/[a-zA-Z]{2,}/g) || [];
    for (const e of engMatches) tokens.add(e.toLowerCase());
    const numMatches = text.match(/\d+/g) || [];
    for (const n of numMatches) tokens.add(n);
    return tokens;
}

function searchKnowledge(query, person, topK) {
    const queryTokens = tokenize(query);
    if (queryTokens.size === 0) return [];

    const persons = person === 'all' ? ['谢胜子', '曲曲'] : [person];
    const scored = [];

    for (const p of persons) {
        const entries = KNOWLEDGE_BASE[p] || [];
        for (const entry of entries) {
            const entryTokens = new Set(entry.keywords || []);
            let overlap = 0;
            for (const t of queryTokens) {
                if (entryTokens.has(t)) overlap++;
            }
            if (overlap > 0) {
                let score = overlap * (1 + 0.5 * overlap);
                const headingTokens = tokenize(entry.heading || '');
                let headingOverlap = 0;
                for (const t of queryTokens) {
                    if (headingTokens.has(t)) headingOverlap++;
                }
                score += headingOverlap * 3;
                scored.push({ score, entry, person: p });
            }
        }
    }

    scored.sort((a, b) => b.score - a.score);
    return scored.slice(0, topK || 5);
}

        const messagesDiv = document.getElementById('chat-messages');
        const chipsDiv = document.createElement('div');
        chipsDiv.className = 'ref-chips';
        references.forEach(ref => {
            const chip = document.createElement('span');
            chip.className = 'ref-chip' + (currentPerson === '曲曲' ? ' ququ-mode' : '');
            chip.textContent = ref.domain;
            chipsDiv.appendChild(chip);
        });
        messagesDiv.appendChild(chipsDiv);
    }

    // ============================================================
    // Chat History (localStorage)
    // ============================================================
    function saveChatHistory() {
        try {
            localStorage.setItem('chat_' + currentPerson, JSON.stringify(chatHistory));
        } catch(e) {}
    }

    function loadChatHistory(person) {
        try {
            var saved = localStorage.getItem('chat_' + person);
            return saved ? JSON.parse(saved) : [];
        } catch(e) { return []; }
    }

    function renderChatHistory(person) {
        var history = loadChatHistory(person);
        chatHistory = history;
        // Clear messages container
        var container = document.getElementById('chat-messages');
        var welcome = document.getElementById('welcome-msg');
        if (welcome) welcome.style.display = 'none';
        // Remove all msg divs
        var msgs = container.querySelectorAll('.msg, .ref-chips');
        msgs.forEach(function(m) { m.remove(); });
        // Re-render each message
        for (var i = 0; i < history.length; i++) {
            var isUser = history[i].isUser;
            var text = history[i].text;
            var msgDiv = document.createElement('div');
            msgDiv.className = 'msg ' + (isUser ? 'user' : 'ai');
            if (currentPerson === '曲曲') msgDiv.classList.add('ququ-mode');
            var avatarHtml = isUser ? '' : '<div class="avatar-sm">' + descs[currentPerson].avatar + '</div>';
            msgDiv.innerHTML = avatarHtml + '<div class="bubble">' + text + '</div>';
            container.appendChild(msgDiv);
        }
        container.scrollTop = container.scrollHeight;
    }

    function clearChatHistory() {
        if (!confirm('确定清空 ' + currentPerson + ' 的聊天记录吗？')) return;
        chatHistory = [];
        try { localStorage.removeItem('chat_' + currentPerson); } catch(e) {}
        // Clear messages from DOM
        var container = document.getElementById('chat-messages');
        var msgs = container.querySelectorAll('.msg, .ref-chips');
        msgs.forEach(function(m) { m.remove(); });
        // Show welcome message
        var welcome = document.getElementById('welcome-msg');
        if (welcome) welcome.style.display = 'block';
    }

    // ============================================================
    // Voice & Image
    // ============================================================
    var mediaRecorder = null;
    var audioChunks = [];
    var recordingStartTime = 0;
    var recordingTimer = null;
    var isRecording = false;
    var audioStream = null;
    var currentImageData = null; // base64 of selected image



    // Tap-to-toggle voice recording
    function toggleRecording() {
        if (isRecording) {
            // Stop recording
            isRecording = false;
            clearInterval(recordingTimer);
            document.getElementById('recording-panel').classList.remove('active');
            document.getElementById('mic-btn').classList.remove('recording');
            document.getElementById('mic-btn').textContent = '🎤';

            if (mediaRecorder && mediaRecorder.state !== 'inactive') {
                mediaRecorder.stop();
            }
            if (audioStream) {
                audioStream.getTracks().forEach(function(t) { t.stop(); });
                audioStream = null;
            }

            var elapsed = (Date.now() - recordingStartTime) / 1000;
            if (elapsed < 0.8 || audioChunks.length === 0) {
                showMicHint('说话时间太短');
                return;
            }

            showTyping('识别语音中...');
            var audioBlob = new Blob(audioChunks, { type: mediaRecorder ? mediaRecorder.mimeType : 'audio/webm' });
            var reader = new FileReader();
            reader.onloadend = function() {
                var base64Audio = reader.result.split(',')[1];
                var historyForAPI = chatHistory.slice(-10);
                fetch('/api/voice-chat', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        audio: base64Audio,
                        mimeType: audioBlob.type,
                        person: currentPerson,
                        history: historyForAPI
                    })
                })
                .then(function(r) { return r.json(); })
                .then(function(data) {
                    hideTyping();
                    if (data.mode === 'error') {
                        addMessage('🎤 语音识别失败: ' + (data.error || '未知错误'), false);
                        return;
                    }
                    addMessage('🎤 ' + data.transcribed, true);
                    addMessage(data.reply, false);
                    if (data.references) addRefChips(data.references);
                })
                .catch(function() {
                    hideTyping();
                    addMessage('🎤 语音处理出错，请稍后再试', false);
                });
            };
            reader.readAsDataURL(audioBlob);
        } else {
            // Start recording
            if (isWaiting) return;
            audioChunks = [];
            document.getElementById('recording-panel').classList.add('active');
            document.getElementById('rp-timer').textContent = '00:00';
            document.getElementById('mic-btn').classList.add('recording');
            document.getElementById('mic-btn').textContent = '⏹';

            recordingStartTime = Date.now();
            recordingTimer = setInterval(function() {
                var elapsed = Math.floor((Date.now() - recordingStartTime) / 1000);
                var m = String(Math.floor(elapsed / 60)).padStart(2, '0');
                var s = String(elapsed % 60).padStart(2, '0');
                document.getElementById('rp-timer').textContent = m + ':' + s;
            }, 100);

            navigator.mediaDevices.getUserMedia({ audio: true })
                .then(function(stream) {
                    audioStream = stream;
                    var options = {};
                    if (MediaRecorder.isTypeSupported('audio/webm;codecs=opus')) options = { mimeType: 'audio/webm;codecs=opus' };
                    else if (MediaRecorder.isTypeSupported('audio/mp4')) options = { mimeType: 'audio/mp4' };
                    else if (MediaRecorder.isTypeSupported('audio/webm')) options = { mimeType: 'audio/webm' };
                    mediaRecorder = new MediaRecorder(stream, options);
                    audioChunks = [];
                    mediaRecorder.ondataavailable = function(e) { if (e.data.size > 0) audioChunks.push(e.data); };
                    mediaRecorder.start(100);
                    isRecording = true;
                })
                .catch(function(err) {
                    stopRecordingCleanup();
                    showMicHint('无法访问麦克风: ' + err.message);
                });
        }
    }

    function stopRecordingCleanup() {
        isRecording = false;
        clearInterval(recordingTimer);
        document.getElementById('recording-panel').classList.remove('active');
        document.getElementById('mic-btn').classList.remove('recording');
        document.getElementById('mic-btn').textContent = '🎤';
        if (mediaRecorder && mediaRecorder.state !== 'inactive') mediaRecorder.stop();
        if (audioStream) { audioStream.getTracks().forEach(function(t) { t.stop(); }); audioStream = null; }
    }

    // Image upload
    function setupImageUpload() {
        var btn = document.getElementById('img-btn');
        var fileInput = document.getElementById('file-input');
        var preview = document.getElementById('img-preview');
        var previewImg = document.getElementById('preview-img');
        var previewName = document.getElementById('preview-name');
        var removeBtn = document.getElementById('preview-remove');

        btn.onclick = function() { fileInput.click(); };
        fileInput.onchange = function() {
            var file = fileInput.files[0];
            if (!file) return;
            var reader = new FileReader();
            reader.onloadend = function() {
                currentImageData = reader.result;
                previewImg.src = currentImageData;
                previewName.textContent = file.name;
                preview.classList.add('active');
            };
            reader.readAsDataURL(file);
        };
        removeBtn.onclick = function() {
            currentImageData = null;
            preview.classList.remove('active');
            fileInput.value = '';
        };
    }

    // Wire up mic button (tap to toggle recording)
    document.getElementById('mic-btn').onclick = toggleRecording;

    // Wire up image upload
    setupImageUpload();

    function showMicHint(msg) {
        var hint = document.getElementById('mic-hint');
        if (!hint) {
            hint = document.createElement('div');
            hint.id = 'mic-hint';
            hint.style.cssText = 'position:fixed;bottom:80px;left:50%;transform:translateX(-50%);background:#333;color:#fff;padding:10px 18px;border-radius:10px;font-size:13px;z-index:999;max-width:80%;text-align:center;animation:fadeIn 0.3s;';
            document.body.appendChild(hint);
        }
        hint.textContent = msg;
        hint.style.display = 'block';
        clearTimeout(hint._timer);
        hint._timer = setTimeout(function() { hint.style.display = 'none'; }, 3500);
    }

    function sendMessage() {
        const input = document.getElementById('message-input');
        const text = input.value.trim();
        if ((!text && !currentImageData) || isWaiting) return;

        var payload = { query: text || '', person: currentPerson, history: chatHistory.slice(-10) };

        // Include image if present
        var hasImage = !!currentImageData;
        if (hasImage) {
            payload.image = currentImageData;
            // Clear image preview
            currentImageData = null;
            document.getElementById('img-preview').classList.remove('active');
            document.getElementById('file-input').value = '';
        }

        input.value = '';
        isWaiting = true;
        var displayText = text || (hasImage ? '[图片]' : '');
        addMessage(displayText || '[图片]', true);
        showTyping('思考中...');

        fetch('/api/chat-llm', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify(payload)
        })
        .then(function(r) { return r.json(); })
        .then(function(data) {
            hideTyping();
            addMessage(data.reply, false);
            addRefChips(data.references || []);
            isWaiting = false;
        })
        .catch(function() {
            // Fallback: local search (text only)
            if (text) {
                setTimeout(function() {
                    const results = searchKnowledge(text, currentPerson, 5);
                    const formatted = formatReply(results, currentPerson);
                    hideTyping();
                    addMessage(formatted.reply, false);
                    addRefChips(formatted.references);
                    isWaiting = false;
                }, 500);
            } else {
                hideTyping();
                addMessage('图片处理失败，请重试', false);
                isWaiting = false;
            }
        });
    }

    document.getElementById('message-input').addEventListener('keydown', function(e) {
        if (e.key === 'Enter') sendMessage();
    });

    // Show counts on selection cards
    document.addEventListener('DOMContentLoaded', function() {
        setTimeout(() => {
            const xieCount = (KNOWLEDGE_BASE['谢胜子'] || []).length;
            const ququCount = (KNOWLEDGE_BASE['曲曲'] || []).length;
            document.querySelector('.card-xie .tag').textContent += ' · ' + xieCount + '条';
            document.querySelector('.card-ququ .tag').textContent += ' · ' + ququCount + '条';
        }, 100);
    });
</script>
